<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Interrupted Time Series: Italian Smoking Ban</title>
  <desc id="desc">Stylized interrupted time-series graph showing observed hospital admissions before and after the January 2005 Italian smoking ban, with a dashed counterfactual path and an estimated effect gap.</desc>
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10" fill="none" stroke="#222" stroke-width="2"/>
    </marker>
    <marker id="arrowPurple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10" fill="none" stroke="#7b3294" stroke-width="2"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="#fffdf7"/>

  <rect x="315" y="34" width="970" height="90" rx="24" fill="#fff8e8" stroke="#7f4f24" stroke-width="4" filter="url(#softShadow)"/>
  <text x="800" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#16213e">
    Interrupted Time Series: Italian Smoking Ban
  </text>

  <rect x="110" y="175" width="1380" height="555" rx="22" fill="#ffffff" stroke="#c7c7c7" stroke-width="3"/>
  <rect x="158" y="220" width="590" height="450" rx="18" fill="#dceeff" opacity="0.58"/>
  <rect x="748" y="220" width="690" height="450" rx="18" fill="#fff0d9" opacity="0.62"/>

  <!-- axes -->
  <line x1="170" y1="660" x2="1430" y2="660" stroke="#222" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="170" y1="660" x2="170" y2="210" stroke="#222" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="1425" y="705" text-anchor="end" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#222">Time</text>
  <text x="95" y="405" transform="rotate(-90 95 405)" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#222">
    Hospital admissions for acute coronary events
  </text>

  <!-- policy line -->
  <line x1="748" y1="205" x2="748" y2="660" stroke="#222" stroke-width="4" stroke-dasharray="11 11"/>
  <text x="768" y="250" font-family="Arial, sans-serif" font-size="31" font-weight="700" fill="#222">Smoking ban</text>
  <text x="768" y="287" font-family="Arial, sans-serif" font-size="27" font-weight="700" fill="#222">Jan 2005</text>

  <!-- region labels -->
  <text x="455" y="705" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#0b4f9c">Pre-ban period</text>
  <text x="1095" y="705" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#8a4f00">Post-ban period</text>

  <!-- observed pre path -->
  <polyline fill="none" stroke="#1f78b4" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"
    points="215,462 260,430 305,448 350,405 395,418 440,378 485,394 530,366 575,382 620,350 665,360 710,338"/>
  <g fill="#73b7ff" stroke="#111" stroke-width="3">
    <circle cx="215" cy="462" r="9"/><circle cx="260" cy="430" r="9"/><circle cx="305" cy="448" r="9"/>
    <circle cx="350" cy="405" r="9"/><circle cx="395" cy="418" r="9"/><circle cx="440" cy="378" r="9"/>
    <circle cx="485" cy="394" r="9"/><circle cx="530" cy="366" r="9"/><circle cx="575" cy="382" r="9"/>
    <circle cx="620" cy="350" r="9"/><circle cx="665" cy="360" r="9"/><circle cx="710" cy="338" r="9"/>
  </g>

  <!-- forecasted counterfactual -->
  <path d="M215,460 C350,405 520,370 710,340 C870,305 1035,270 1380,230"
        fill="none" stroke="#e66101" stroke-width="7" stroke-linecap="round" stroke-dasharray="19 17"/>

  <!-- observed post path -->
  <polyline fill="none" stroke="#111111" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"
    points="785,382 830,370 875,386 920,360 965,372 1010,350 1055,365 1100,342 1145,358 1190,336 1235,350 1280,330 1325,340 1370,322"/>
  <g fill="#111111" stroke="#111" stroke-width="3">
    <circle cx="785" cy="382" r="9"/><circle cx="830" cy="370" r="9"/><circle cx="875" cy="386" r="9"/>
    <circle cx="920" cy="360" r="9"/><circle cx="965" cy="372" r="9"/><circle cx="1010" cy="350" r="9"/>
    <circle cx="1055" cy="365" r="9"/><circle cx="1100" cy="342" r="9"/><circle cx="1145" cy="358" r="9"/>
    <circle cx="1190" cy="336" r="9"/><circle cx="1235" cy="350" r="9"/><circle cx="1280" cy="330" r="9"/>
    <circle cx="1325" cy="340" r="9"/><circle cx="1370" cy="322" r="9"/>
  </g>

  <!-- effect gap -->
  <line x1="1245" y1="252" x2="1245" y2="345" stroke="#7b3294" stroke-width="5" marker-end="url(#arrowPurple)"/>
  <line x1="1245" y1="345" x2="1245" y2="252" stroke="#7b3294" stroke-width="5" marker-end="url(#arrowPurple)"/>
  <text x="1270" y="292" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#7b3294">estimated</text>
  <text x="1270" y="328" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#7b3294">effect</text>

  <!-- callouts -->
  <rect x="218" y="240" width="370" height="96" rx="18" fill="#ffffff" stroke="#333" stroke-width="3" filter="url(#softShadow)"/>
  <text x="403" y="281" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#222">Use the pre-ban trajectory</text>
  <text x="403" y="314" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#222">to learn the expected path</text>

  <rect x="940" y="430" width="390" height="120" rx="18" fill="#ffffff" stroke="#333" stroke-width="3" filter="url(#softShadow)"/>
  <text x="1135" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#222">Counterfactual:</text>
  <text x="1135" y="503" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#222">what would have happened</text>
  <text x="1135" y="536" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#222">without the ban?</text>

  <!-- legend -->
  <rect x="140" y="755" width="1320" height="72" rx="18" fill="#fff8e8" stroke="#d89a00" stroke-width="3"/>
  <line x1="182" y1="790" x2="252" y2="790" stroke="#1f78b4" stroke-width="7"/>
  <circle cx="217" cy="790" r="8" fill="#73b7ff" stroke="#111" stroke-width="3"/>
  <text x="270" y="800" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#222">Observed before ban</text>
  <line x1="595" y1="790" x2="665" y2="790" stroke="#111" stroke-width="7"/>
  <circle cx="630" cy="790" r="8" fill="#111"/>
  <text x="683" y="800" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#222">Observed after ban</text>
  <line x1="1005" y1="790" x2="1085" y2="790" stroke="#e66101" stroke-width="7" stroke-dasharray="19 17"/>
  <text x="1103" y="800" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#222">Forecasted counterfactual</text>

  <text x="800" y="868" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#444">
    Stylized illustration, not original data. Based on Cesaroni et al. (2008).
  </text>
</svg>
