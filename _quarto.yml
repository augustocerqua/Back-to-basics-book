project:
  type: book
  output-dir: docs

book:
  title: "The Backbone of Impact Evaluation Methods"
  subtitle: "Back to Basics"
  author: "Augusto Cerqua"
  date: today
  cover-image: images/book_cover.png
  site-url: "https://augustocerqua.github.io/backbone-impact-evaluation/"
  repo-url: "https://github.com/augustocerqua/backbone-impact-evaluation"
  repo-actions: [edit, issue]
  downloads: [pdf, epub]
  sharing: [twitter, linkedin]
  page-footer:
    left: "© Augusto Cerqua"
    right: "Built with Quarto"
  chapters:
    - index.qmd
    - chapters/preface.qmd
    - part: "Foundations"
      chapters:
        - chapters/01-why-impact-evaluation.qmd
        - chapters/02-counterfactual-thinking.qmd
        - chapters/03-potential-outcomes.qmd
        - chapters/04-causal-parameters.qmd
    - part: "Core Designs"
      chapters:
        - chapters/05-randomized-experiments.qmd
        - chapters/06-selection-on-observables.qmd
        - chapters/07-difference-in-differences.qmd
        - chapters/08-event-studies.qmd
        - chapters/09-regression-discontinuity.qmd
        - chapters/10-instrumental-variables.qmd
        - chapters/11-synthetic-control.qmd
    - part: "Practice"
      chapters:
        - chapters/12-choosing-a-design.qmd
        - chapters/13-threats-to-identification.qmd
        - chapters/14-communicating-results.qmd
    - chapters/references.qmd

bibliography: references/references.bib
# csl: references/american-economic-association.csl

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    css: styles/styles.css
    toc: true
    toc-depth: 3
    number-sections: true
    code-fold: true
    code-tools: true
    fig-cap-location: bottom
    tbl-cap-location: top
  pdf:
    documentclass: scrreprt
    toc: true
    number-sections: true
    colorlinks: true
    include-in-header: cover.tex
  epub:
    toc: true

execute:
  freeze: auto
  echo: true
  warning: false
  message: false
